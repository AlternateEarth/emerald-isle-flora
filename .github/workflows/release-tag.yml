name: Release

on:
  push:
    tags: ["v*"]

env:
  GAME_VERSION: 1.20.1
  JAVA_VERSION: 21
  MODRINTH_TOKEN: ${{ secrets.PUBLISH_MODRINTH_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.PUBLISH_GITHUB_TOKEN }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout The Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Verify tag matches gradle.properties version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION="$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)"
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (version $TAG_VERSION) doesn't match mod_version=$PROJECT_VERSION in gradle.properties"
            exit 1
          fi

      - name: Build mod
        uses: ./.github/actions/build-mod
        with:
          java-version: ${{ env.JAVA_VERSION }}

      - name: Publish Build Artifacts to GitHub Release and Modrinth
        uses: Kir-Antipov/mc-publish@52307b03863581dec6b652b83e597aec02ebb075 # v3.3.1
        with:
          files: build/libs/!(*-@(dev|sources|javadoc)).jar
          name: "Emerald Isle Flora ${{ github.ref_name }}"
          version: ${{ github.ref_name }}
          version-type: release
          loaders: fabric
          game-versions: ${{ env.GAME_VERSION }}

          # --- Modrinth ---
          modrinth-id: fmhwwICG
          modrinth-token: ${{env.MODRINTH_TOKEN}}

          # --- GitHub ---
          github-token: ${{env.GITHUB_TOKEN}}
          github-tag: ${{ github.ref_name }}
          github-generate-changelog: true
