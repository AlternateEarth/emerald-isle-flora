name: 'Build Mod'
description: 'Sets up JDK and Gradle, then builds the mod jar. Assumes the repo is already checked out.'
inputs:
  java-version:
    description: 'JDK version to build with'
    required: false
    default: '17'
runs:
  using: 'composite'
  steps:
    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

    - name: Set Up JDK ${{ inputs.java-version }}
      uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
      with:
        distribution: "temurin"
        java-version: ${{ inputs.java-version }}

    - name: Make Gradle wrapper executable
      shell: bash
      run: chmod +x ./gradlew

    - name: Make Gradle Wrapper Executable
      shell: bash
      run: chmod +x ./gradlew

    - name: Setup Gradle For Optimal Use
      uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

    - name: Build With Gradle
      shell: bash
      run: ./gradlew build